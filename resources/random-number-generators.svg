<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1032" height="1120" viewBox="0 0 1032 1120">
<rect width="1032" height="1120" fill="#fafafa"/>
<text x="20" y="42" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">Random Number Generator Taxonomy</text>
<text x="20" y="62" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666666">Classified by construction and cryptographic suitability.</text>
<rect x="20" y="80" width="992" height="243" fill="#e8f0fe" stroke="#4285f4" stroke-width="2" rx="4"/>
<text x="32" y="101" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">CSPRNG / DRBG  (cryptographically secure)</text>
<rect x="32" y="124" width="316" height="187" fill="#f0f6ff" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="40" y="141" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">NIST SP 800-90A DRBGs</text>
<rect x="40" y="158" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="171" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Hash_DRBG</text>
<text x="48" y="185" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">SHA-based; seeded from entropy</text>
<rect x="40" y="195" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="208" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">HMAC_DRBG</text>
<text x="48" y="222" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">HMAC-based; widely deployed</text>
<rect x="40" y="232" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="245" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">CTR_DRBG</text>
<text x="48" y="259" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">block cipher counter mode</text>
<rect x="40" y="269" width="300" height="34" fill="#ffebee" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="282" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Dual_EC_DRBG</text>
<text x="48" y="296" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">backdoored; disallowed 2014</text>
<rect x="358" y="124" width="316" height="113" fill="#f0f6ff" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="366" y="141" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Accumulator-based CSPRNGs</text>
<rect x="366" y="158" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="171" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Fortuna</text>
<text x="374" y="185" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">32 entropy pools + AES-256-CTR</text>
<rect x="366" y="195" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="208" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Yarrow</text>
<text x="374" y="222" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">predecessor of Fortuna</text>
<rect x="684" y="124" width="316" height="113" fill="#f0f6ff" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="692" y="141" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Stream-cipher-based</text>
<rect x="692" y="158" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="700" y="171" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">ChaCha20-DRNG</text>
<text x="700" y="185" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Linux kernel CSPRNG (4.8+)</text>
<rect x="692" y="195" width="300" height="34" fill="#fff3e0" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="700" y="208" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">RC4-PRNG</text>
<text x="700" y="222" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">deprecated; RC4 biases</text>
<rect x="20" y="339" width="666" height="280" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="4"/>
<text x="32" y="360" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">OS Entropy APIs &amp; Hardware RNG</text>
<rect x="32" y="383" width="316" height="224" fill="#fff8e1" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="40" y="400" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">OS Entropy APIs</text>
<rect x="40" y="417" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="430" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">getrandom()</text>
<text x="48" y="444" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Linux syscall</text>
<rect x="40" y="454" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="467" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">getentropy()</text>
<text x="48" y="481" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">OpenBSD / glibc 2.25+</text>
<rect x="40" y="491" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="504" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">/dev/urandom</text>
<text x="48" y="518" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Linux non-blocking device</text>
<rect x="40" y="528" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="541" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">/dev/random</text>
<text x="48" y="555" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Linux blocking device (legacy)</text>
<rect x="40" y="565" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="578" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">BCryptGenRandom</text>
<text x="48" y="592" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Windows CNG API</text>
<rect x="358" y="383" width="316" height="224" fill="#fff8e1" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="366" y="400" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Hardware RNG</text>
<rect x="366" y="417" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="430" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">RDRAND</text>
<text x="374" y="444" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Intel/AMD on-chip DRBG</text>
<rect x="366" y="454" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="467" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">RDSEED</text>
<text x="374" y="481" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Intel/AMD entropy source</text>
<rect x="366" y="491" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="504" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">TPM_RNG</text>
<text x="374" y="518" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">TPM 2.0 hardware RNG</text>
<rect x="366" y="528" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="541" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">HRNG</text>
<text x="374" y="555" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">generic hardware RNG</text>
<rect x="366" y="565" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="578" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">TRNG</text>
<text x="374" y="592" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">true RNG (physical entropy)</text>
<rect x="20" y="635" width="666" height="280" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="4"/>
<text x="32" y="656" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Non-cryptographic PRNGs  (statistical use only — NOT crypto-safe)</text>
<rect x="32" y="679" width="316" height="224" fill="#fce4ec" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="40" y="696" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Modern PRNGs</text>
<rect x="40" y="713" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="726" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">MT19937</text>
<text x="48" y="740" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">Mersenne Twister; state recoverable</text>
<rect x="40" y="750" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="763" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Xoshiro (256/512)</text>
<text x="48" y="777" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">linear feedback; fast</text>
<rect x="40" y="787" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="800" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Xoroshiro (128/64)</text>
<text x="48" y="814" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">small-state Xoshiro variant</text>
<rect x="40" y="824" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="837" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">PCG</text>
<text x="48" y="851" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">LCG + output permutation</text>
<rect x="40" y="861" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="874" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">SplitMix64</text>
<text x="48" y="888" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">seed-initialiser for Xoshiro</text>
<rect x="358" y="679" width="316" height="150" fill="#fce4ec" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="366" y="696" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Legacy PRNGs</text>
<rect x="366" y="713" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="726" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">LCG</text>
<text x="374" y="740" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">linear congruential; trivially predictable</text>
<rect x="366" y="750" width="300" height="34" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="763" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">ISAAC</text>
<text x="374" y="777" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">historical; replaced by ChaCha20</text>
<rect x="366" y="787" width="300" height="34" fill="#fff3e0" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="374" y="800" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">ANSIX931</text>
<text x="374" y="814" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">withdrawn 2011</text>
<rect x="20" y="931" width="340" height="169" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="4"/>
<text x="32" y="952" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Historical &amp; Broken  (telecom / legacy)</text>
<rect x="32" y="975" width="316" height="113" fill="#ffebee" stroke="#cccccc" stroke-width="1" rx="3"/>
<text x="40" y="992" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">GSM stream ciphers</text>
<rect x="40" y="1009" width="300" height="34" fill="#ffebee" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="1022" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">A5/1</text>
<text x="48" y="1036" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">GSM stream cipher; broken</text>
<rect x="40" y="1046" width="300" height="34" fill="#ffebee" stroke="#cccccc" stroke-width="1" rx="2"/>
<text x="48" y="1059" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">A5/2</text>
<text x="48" y="1073" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555555">GSM stream cipher; broken (export)</text>
</svg>